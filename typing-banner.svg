<svg width="650" height="60" viewBox="0 0 650 60" xmlns="http://www.w3.org/2000/svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&amp;display=swap');
.wrap{font-family:'Fira Code',monospace;font-size:28px;font-weight:500;}
.banner{animation:reveal 8s ease-in-out infinite;}
@keyframes reveal{
  0%{opacity:0;transform:scale(0.9);}
  8%{opacity:1;transform:scale(1);}
  100%{opacity:1;transform:scale(1);}
}
.p{position:absolute;top:0;left:0;overflow:hidden;white-space:nowrap;height:60px;display:flex;align-items:center;width:0;}
.p1{animation:p1 8s linear infinite;}
@keyframes p1{
  0%{width:0}
  9.999%{width:0}
  10%{width:0}
  18%{width:340px;animation-timing-function:steps(20,end);}
  29.9%{width:340px}
  30%{width:0}
  100%{width:0}
}
.p2{animation:p2 8s linear infinite;}
@keyframes p2{
  0%{width:0}
  29.999%{width:0}
  30%{width:0}
  37%{width:272px;animation-timing-function:steps(16,end);}
  48.9%{width:272px}
  49%{width:0}
  100%{width:0}
}
.p3{animation:p3 8s linear infinite;}
@keyframes p3{
  0%{width:0}
  48.999%{width:0}
  49%{width:0}
  58%{width:476px;animation-timing-function:steps(28,end);}
  72.9%{width:476px}
  73%{width:0}
  100%{width:0}
}
.p4{animation:p4 8s linear infinite;}
@keyframes p4{
  0%{width:0}
  72.999%{width:0}
  73%{width:0}
  83%{width:578px;animation-timing-function:steps(34,end);}
  99.9%{width:578px}
  100%{width:0}
}
</style>
<foreignObject x="10" y="0" width="630" height="60">
  <div xmlns="http://www.w3.org/1999/xhtml" class="wrap banner" style="position:relative;width:630px;height:60px;">
    <div class="p p1"><span style="color:#FFFFFF">Welcome to&#160;</span><span style="color:#22C55E">QuantSync</span></div>
    <div class="p p2"><span style="color:#FFFFFF">About&#160;</span><span style="color:#22C55E">QuantSync&#160;</span></div>
    <div class="p p3"><span style="color:#FF7A00">Low&#160;Latency&#160;</span><span style="color:#22C55E">A.I&#160;</span><span style="color:#FFFFFF">Architecture</span></div>
    <div class="p p4"><span style="color:#FFFFFF">High&#160;Performance&#160;</span><span style="color:#22C55E">Systems&#160;</span><span style="color:#FF7A00">Engineer</span></div>
  </div>
</foreignObject>
</svg>
